<section class="im-searchpage im-page">
  <h1 class="im-post-title">Search</h1>
  <p class="im-text-muted im-margin-bottom-5">Search across every guide, project, video, review, trip, podcast and note.</p>

  <div class="im-searchpage-field">
    <i class="ph-bold ph-magnifying-glass" aria-hidden="true"></i>
    <input type="search" id="im-sp-input" placeholder="Type to search…" autocomplete="off" autofocus aria-label="Search">
  </div>

  <ul class="im-searchpage-results" id="im-sp-results"></ul>
</section>

<script>
(function () {
  var input = document.getElementById('im-sp-input');
  var out = document.getElementById('im-sp-results');
  if (!input || !out) return;
  var data = [];
  fetch('{{ "/assets/search.json" | relative_url }}').then(function (r) { return r.json(); }).then(function (d) { data = d; });

  function render() {
    var q = input.value.trim().toLowerCase();
    if (!q) { out.innerHTML = ''; return; }
    var hits = data.filter(function (it) {
      return (it.title || '').toLowerCase().indexOf(q) > -1 || (it.content || '').toLowerCase().indexOf(q) > -1;
    }).slice(0, 30);
    if (!hits.length) { out.innerHTML = '<li class="im-search-empty">Nothing found for “' + q + '”.</li>'; return; }
    out.innerHTML = hits.map(function (it) {
      var chip = it.collection ? '<span class="im-search-chip">' + it.collection + '</span> ' : '';
      return '<li class="im-searchpage-result"><h3>' + chip + '<a href="' + it.url + '">' + it.title + '</a></h3>' +
             '<p>' + ((it.excerpt || '').slice(0, 160)) + '</p></li>';
    }).join('');
  }
  input.addEventListener('input', render);
})();
</script>
<noscript>Please enable JavaScript to use search.</noscript>
